<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission To Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="container">
        <h1>Permission To Game</h1>
        
        <input type="text" id="player-name" placeholder="Tu Nombre">
        
        <p>Elige tu personaje:</p>
        <div class="avatar-selector">
            <img src="avatar1.png" class="avatar-option selected" data-img="avatar1.png" onclick="selectAvatar(this)">
            <img src="avatar2.png" class="avatar-option" data-img="avatar2.png" onclick="selectAvatar(this)">
            <img src="avatar3.png" class="avatar-option" data-img="avatar3.png" onclick="selectAvatar(this)">
            <img src="avatar4.png" class="avatar-option" data-img="avatar4.png" onclick="selectAvatar(this)">
        </div>
        
        <div class="setup-actions">
            <button onclick="startAsHost()" class="setup-btn">Crear Sala</button>
            <div class="divider">o</div>
            <input type="text" id="join-id" placeholder="Código de Sala">
            <button onclick="startAsPlayer()" class="setup-btn secondary">Unirse</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="header">
            <span id="room-display">SALA: ---</span>
            <span id="player-display">YO: ---</span>
        </div>

        <div id="winner-banner" class="hidden">
            <img id="winner-photo" src="" alt="Ganador">
            <p>¡GANADOR!</p>
            <h2 id="winner-name">---</h2>
        </div>

        <div class="buzzer-area">
            <button id="main-buzzer">¡PULSAR!</button>
        </div>

        <div id="host-controls" class="hidden">
            <button id="reset-btn">Siguiente Ronda</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
